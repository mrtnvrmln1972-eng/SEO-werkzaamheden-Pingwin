<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEO werkzaamheden · Pingwin – One Day Clinic</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --orange: #E7773F;
    --orange-dark: #C95E28;
    --orange-light: #FFF4EE;
    --dark: #222222;
    --body-text: #181818;
    --gray: #616161;
    --gray-light: #F5F5F5;
    --white: #FFFFFF;
    --border: #E0E0E0;
    --red: #D32F2F;
    --red-light: #FFEBEE;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Montserrat', sans-serif;
    background: var(--gray-light);
    color: var(--body-text);
    line-height: 1.6;
  }

  /* ── Header ── */
  .header {
    background: var(--white);
    border-bottom: 3px solid var(--orange);
    padding: 20px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .header img { height: 38px; }
  .header-divider {
    width: 1px;
    height: 32px;
    background: var(--border);
  }
  .header-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--dark);
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }
  .header-client {
    font-size: 14px;
    font-weight: 500;
    color: var(--gray);
  }
  .header-updated {
    font-size: 12px;
    color: var(--gray);
    font-weight: 400;
  }

  /* ── Main layout ── */
  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 32px 24px 60px;
  }

  /* ── Month selector ── */
  .month-nav {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 28px;
  }
  .month-btn {
    padding: 10px 20px;
    border: 2px solid var(--border);
    border-radius: 8px;
    background: var(--white);
    font-family: 'Montserrat', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--gray);
    cursor: pointer;
    transition: all 0.2s;
  }
  .month-btn:hover {
    border-color: var(--orange);
    color: var(--orange);
  }
  .month-btn.active {
    background: var(--orange);
    border-color: var(--orange);
    color: var(--white);
  }

  /* ── Stat cards ── */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 32px;
  }
  .stat-card {
    background: var(--white);
    border-radius: 12px;
    padding: 24px;
    border-top: 4px solid var(--orange);
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .stat-card.over-budget {
    border-top-color: var(--red);
    background: var(--red-light);
  }
  .stat-card.over-budget .stat-value {
    color: var(--red);
  }
  .stat-value {
    font-size: 28px;
    font-weight: 800;
    color: var(--orange);
    line-height: 1.1;
  }
  .stat-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--gray);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-top: 6px;
  }
  .stat-sub {
    font-size: 12px;
    color: var(--gray);
    margin-top: 4px;
    font-weight: 400;
  }

  /* ── Progress bar ── */
  .progress-wrap {
    background: var(--white);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 32px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .progress-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .progress-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--dark);
  }
  .progress-pct {
    font-size: 14px;
    font-weight: 700;
    color: var(--orange);
  }
  .progress-bar {
    height: 10px;
    background: var(--gray-light);
    border-radius: 5px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--orange), var(--orange-dark));
    border-radius: 5px;
    transition: width 0.6s ease;
  }

  /* ── Task table ── */
  .section-title {
    font-size: 20px;
    font-weight: 700;
    color: var(--dark);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-title::before {
    content: '';
    width: 4px;
    height: 24px;
    background: var(--orange);
    border-radius: 2px;
    display: inline-block;
  }

  .task-table-wrap {
    background: var(--white);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    margin-bottom: 32px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }
  thead th {
    background: var(--dark);
    color: var(--white);
    padding: 14px 20px;
    text-align: left;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  thead th:last-child { text-align: center; }
  thead th:nth-child(3) { text-align: right; }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }
  tbody tr:nth-child(even) { background: var(--gray-light); }
  tbody tr:hover { background: var(--orange-light); }

  tbody td {
    padding: 14px 20px;
    font-size: 14px;
    font-weight: 400;
    color: var(--body-text);
    vertical-align: middle;
  }
  tbody td:nth-child(3) {
    text-align: right;
    font-weight: 700;
    color: var(--dark);
    white-space: nowrap;
  }
  tbody td:last-child { text-align: center; }

  .task-desc {
    font-size: 12px;
    color: var(--gray);
    margin-top: 3px;
  }

  .badge-done {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .badge-done.klaar {
    background: #E8F5E9;
    color: #2E7D32;
  }
  .badge-done.gepland {
    background: var(--gray-light);
    color: #9E9E9E;
  }
  .badge-done.bezig {
    background: #FFF3E0;
    color: #E65100;
  }

  .doc-link {
    color: var(--orange);
    text-decoration: none;
    font-weight: 600;
    font-size: 13px;
    transition: color 0.2s;
  }
  .doc-link:hover {
    color: var(--orange-dark);
    text-decoration: underline;
  }

  /* ── Footer ── */
  .footer {
    text-align: center;
    padding: 32px;
    color: var(--gray);
    font-size: 12px;
    font-weight: 400;
  }
  .footer a {
    color: var(--orange);
    text-decoration: none;
  }

  /* ── Loading ── */
  .loading {
    text-align: center;
    padding: 60px;
    color: var(--gray);
  }
  .spinner {
    display: inline-block;
    width: 40px;
    height: 40px;
    border: 4px solid var(--border);
    border-top-color: var(--orange);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    background: #FFF3E0;
    border-left: 4px solid var(--orange);
    padding: 20px 24px;
    border-radius: 8px;
    margin: 20px 0;
    font-size: 14px;
    color: var(--dark);
  }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    .header { padding: 16px 20px; flex-direction: column; gap: 8px; }
    .container { padding: 20px 16px 40px; }
    .stats-grid { grid-template-columns: 1fr 1fr; }
    thead th, tbody td { padding: 10px 12px; font-size: 12px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <img src="https://pingwin.nl/wp-content/uploads/2016/11/pingwin_logo.png" alt="Pingwin">
    <div class="header-divider"></div>
    <div>
      <div class="header-title">SEO Werkzaamheden</div>
      <div class="header-client" id="clientName">One Day Clinic</div>
    </div>
  </div>
  <div class="header-updated" id="lastUpdated">Laden...</div>
</div>

<div class="container">
  <!-- Loading state -->
  <div id="loadingState" class="loading">
    <div class="spinner"></div>
    <p>Dashboard wordt geladen...</p>
  </div>

  <!-- Dashboard content (hidden until data loads) -->
  <div id="dashboardContent" style="display:none;">

    <!-- Month navigation -->
    <div class="month-nav" id="monthNav"></div>

    <!-- Stat cards -->
    <div class="stats-grid" id="statsGrid"></div>

    <!-- Progress bar -->
    <div class="progress-wrap">
      <div class="progress-header">
        <span class="progress-title">Voortgang taken deze maand</span>
        <span class="progress-pct" id="progressPct">0%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
      </div>
    </div>

    <!-- Task table -->
    <div class="section-title">Werkzaamheden deze maand</div>
    <div class="task-table-wrap">
      <table>
        <thead>
          <tr>
            <th>Taak</th>
            <th>Toelichting</th>
            <th>Bestede tijd</th>
            <th>Status</th>
            <th>Document</th>
          </tr>
        </thead>
        <tbody id="taskBody"></tbody>
      </table>
    </div>
  </div>
</div>

<div class="footer">
  Pingwin Online Marketing &middot; <a href="https://pingwin.nl" target="_blank">pingwin.nl</a> &middot; info@pingwin.nl
</div>

<script>
// ═══════════════════════════════════════════
// CONFIGURATIE
// ═══════════════════════════════════════════
const CONFIG = {
  clientName: 'One Day Clinic',
  sheetId: '1O1HeqzxCBH-WeyIhb4QhTniBj_Z7RxGpXl5L5FfJW5I',
  gid: '1531693305',
  COL_CATEGORIE: 0,
  COL_TAAK: 1,
  COL_TOELICHTING: 2,
  COL_STANDAARDTIJD: 3,
  COL_STATUS: 4,
  COL_MAAND: 5,
  COL_LINK: 6
};

const MAAND_VOLGORDE = [
  'januari','februari','maart','april','mei','juni',
  'juli','augustus','september','oktober','november','december'
];

// ═══════════════════════════════════════════
// CSV LADEN EN PARSEN
// ═══════════════════════════════════════════
async function fetchSheetData() {
  const url = `https://docs.google.com/spreadsheets/d/${CONFIG.sheetId}/gviz/tq?tqx=out:csv&gid=${CONFIG.gid}`;
  try {
    const response = await fetch(url);
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const csvText = await response.text();
    return parseCSV(csvText);
  } catch (err) {
    console.error('Fout bij laden sheet:', err);
    throw err;
  }
}

function parseCSV(text) {
  const rows = [];
  let current = '';
  let inQuotes = false;
  let row = [];

  for (let i = 0; i < text.length; i++) {
    const char = text[i];
    const next = text[i + 1];

    if (inQuotes) {
      if (char === '"' && next === '"') {
        current += '"';
        i++;
      } else if (char === '"') {
        inQuotes = false;
      } else {
        current += char;
      }
    } else {
      if (char === '"') {
        inQuotes = true;
      } else if (char === ',') {
        row.push(current.trim());
        current = '';
      } else if (char === '\n' || (char === '\r' && next === '\n')) {
        row.push(current.trim());
        rows.push(row);
        row = [];
        current = '';
        if (char === '\r') i++;
      } else {
        current += char;
      }
    }
  }
  if (current || row.length) {
    row.push(current.trim());
    rows.push(row);
  }
  return rows;
}

// ═══════════════════════════════════════════
// DATA STRUCTUREREN
// ═══════════════════════════════════════════
function structureData(rows) {
  if (!rows || rows.length < 2) return null;

  const tasks = [];
  const budget = {
    maandbudget: 0,
    linkbuilding: 0,
    urenBudget: 0,
    beschikbareUren: 0
  };

  let inBudgetSection = false;

  for (let r = 1; r < rows.length; r++) {
    const row = rows[r];
    const colA = (row[CONFIG.COL_CATEGORIE] || '').trim();
    const colB = (row[CONFIG.COL_TAAK] || '').trim();
    const colC = (row[CONFIG.COL_TOELICHTING] || '').trim();
    const colD = (row[CONFIG.COL_STANDAARDTIJD] || '').trim();

    // Detecteer de budgetsectie
    if (colC.toLowerCase().includes('besteding per maand')) {
      inBudgetSection = true;
      continue;
    }

    // Lees budgetwaarden uit de budgetsectie
    if (inBudgetSection) {
      const label = colC.toLowerCase();
      if (label.includes('maandbudget')) {
        budget.maandbudget = parseNumber(colD);
      } else if (label.includes('budget linkbuilding')) {
        budget.linkbuilding = parseNumber(colD);
      } else if (label.includes('resterende uren, na linkbuilding') || label.includes('uren in geld')) {
        budget.urenBudget = parseNumber(colD);
      } else if (label.includes('beschikbare uren per maand')) {
        budget.beschikbareUren = parseNumber(colD);
      }

      // Einde budgetsectie: als er weer een taak/categorie komt
      const nextColA = (row[CONFIG.COL_CATEGORIE] || '').trim();
      const nextColB = (row[CONFIG.COL_TAAK] || '').trim();
      const nextStatus = (row[CONFIG.COL_STATUS] || '').trim();
      const nextMaand = (row[CONFIG.COL_MAAND] || '').trim();
      if (nextMaand || nextStatus) {
        // Dit is weer een taakregel, einde budgetsectie
        inBudgetSection = false;
        // Parse deze rij als taak
        const task = {
          categorie: nextColA,
          taak: nextColB,
          toelichting: colC,
          standaardTijd: parseNumber(colD),
          status: nextStatus,
          maand: nextMaand.toLowerCase(),
          link: (row[CONFIG.COL_LINK] || '').trim()
        };
        if (task.taak) tasks.push(task);
      }
      continue;
    }

    // Normale taakregel
    if (!colB && !colA) continue;

    const task = {
      categorie: colA,
      taak: colB,
      toelichting: colC,
      standaardTijd: parseNumber(colD),
      status: (row[CONFIG.COL_STATUS] || '').trim(),
      maand: (row[CONFIG.COL_MAAND] || '').trim().toLowerCase(),
      link: (row[CONFIG.COL_LINK] || '').trim()
    };

    if (task.taak) tasks.push(task);
  }

  // Bereken uurtarief uit sheet data
  if (budget.urenBudget === 0 && budget.maandbudget > 0) {
    budget.urenBudget = budget.maandbudget - budget.linkbuilding;
  }
  if (budget.beschikbareUren > 0 && budget.urenBudget > 0) {
    budget.uurtarief = budget.urenBudget / budget.beschikbareUren;
  } else {
    budget.uurtarief = 150; // fallback
  }

  // Unieke maanden
  const uniqueMonths = [...new Set(tasks.map(t => t.maand).filter(m => m))];
  uniqueMonths.sort((a, b) => {
    const ia = MAAND_VOLGORDE.indexOf(a);
    const ib = MAAND_VOLGORDE.indexOf(b);
    return (ia === -1 ? 99 : ia) - (ib === -1 ? 99 : ib);
  });

  return { months: uniqueMonths, tasks, budget };
}

function parseNumber(val) {
  if (!val) return 0;
  const cleaned = val.toString().replace(/[^\d,.-]/g, '').replace(',', '.');
  const num = parseFloat(cleaned);
  return isNaN(num) ? 0 : num;
}

function capitalize(str) {
  if (!str) return '';
  return str.charAt(0).toUpperCase() + str.slice(1);
}

// ═══════════════════════════════════════════
// DASHBOARD RENDEREN
// ═══════════════════════════════════════════
let appData = null;
let currentMonth = null;

function renderDashboard(data) {
  appData = data;

  document.getElementById('clientName').textContent = CONFIG.clientName;
  document.getElementById('lastUpdated').textContent = `Laatste update: ${new Date().toLocaleDateString('nl-NL', { day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' })}`;

  const monthNav = document.getElementById('monthNav');
  monthNav.innerHTML = '';

  if (data.months.length === 0) {
    monthNav.innerHTML = '<div class="error-msg">Geen maanden gevonden in kolom F van de Sheet.</div>';
    return;
  }

  data.months.forEach((m, i) => {
    const btn = document.createElement('button');
    btn.className = 'month-btn' + (i === data.months.length - 1 ? ' active' : '');
    btn.textContent = capitalize(m);
    btn.onclick = () => selectMonth(m, btn);
    monthNav.appendChild(btn);
  });

  currentMonth = data.months[data.months.length - 1];
  renderMonth(currentMonth);
}

function selectMonth(monthKey, btn) {
  document.querySelectorAll('.month-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentMonth = monthKey;
  renderMonth(monthKey);
}

function renderMonth(monthKey) {
  const monthTasks = appData.tasks.filter(t => t.maand === monthKey);
  const b = appData.budget;

  // Status matching: klaar, bezig, gepland
  const doneTasks = monthTasks.filter(t => t.status.toLowerCase() === 'klaar');
  const bezigTasks = monthTasks.filter(t => t.status.toLowerCase() === 'bezig');
  const geplandTasks = monthTasks.filter(t => t.status.toLowerCase() === 'gepland');

  const totalTasks = monthTasks.length;
  const doneCount = doneTasks.length;
  const bezigCount = bezigTasks.length;
  const geplandCount = geplandTasks.length;

  // Uren besteed = kolom D van afgeronde taken (klaar) + bezig taken
  const doneMinutes = doneTasks.reduce((sum, t) => sum + (t.standaardTijd || 0), 0);
  const bezigMinutes = bezigTasks.reduce((sum, t) => sum + (t.standaardTijd || 0), 0);
  const totalMinutesDone = doneMinutes + bezigMinutes;
  const totalHours = totalMinutesDone / 60;
  const urenInGeld = totalHours * b.uurtarief;

  // Totaal besteed = uren in geld + linkbuilding
  const totaalBesteed = urenInGeld + b.linkbuilding;
  const isOverBudget = totaalBesteed > b.maandbudget;

  // Render 5 stat cards
  const statsGrid = document.getElementById('statsGrid');
  statsGrid.innerHTML = `
    <div class="stat-card">
      <div class="stat-value">${doneCount}/${totalTasks}</div>
      <div class="stat-label">Taken afgerond</div>
      <div class="stat-sub">${bezigCount > 0 ? bezigCount + ' bezig, ' : ''}${geplandCount} gepland</div>
    </div>
    <div class="stat-card">
      <div class="stat-value">${totalHours.toFixed(1)}u</div>
      <div class="stat-label">Uren besteed</div>
      <div class="stat-sub">&euro;${urenInGeld.toFixed(0)} (${b.beschikbareUren > 0 ? b.beschikbareUren : 12}u beschikbaar)</div>
    </div>
    <div class="stat-card">
      <div class="stat-value">&euro;${b.linkbuilding.toFixed(0)}</div>
      <div class="stat-label">Linkbuilding</div>
      <div class="stat-sub">Maandelijks budget</div>
    </div>
    <div class="stat-card ${isOverBudget ? 'over-budget' : ''}">
      <div class="stat-value">&euro;${totaalBesteed.toFixed(0)}</div>
      <div class="stat-label">Totaal besteed</div>
      <div class="stat-sub">${isOverBudget ? 'Over budget!' : 'Binnen budget'} (max &euro;${b.maandbudget.toFixed(0)})</div>
    </div>
    <div class="stat-card">
      <div class="stat-value">&euro;${b.maandbudget.toFixed(0)}</div>
      <div class="stat-label">Maandfee</div>
      <div class="stat-sub">Incl. linkbuilding &euro;${b.linkbuilding.toFixed(0)}</div>
    </div>
  `;

  // Progress bar
  const pct = totalTasks > 0 ? Math.round((doneCount / totalTasks) * 100) : 0;
  document.getElementById('progressPct').textContent = `${pct}%`;
  document.getElementById('progressFill').style.width = `${pct}%`;

  // Render taaktabel
  const taskBody = document.getElementById('taskBody');
  taskBody.innerHTML = '';

  if (monthTasks.length === 0) {
    const tr = document.createElement('tr');
    tr.innerHTML = '<td colspan="5" style="text-align:center;padding:40px;color:var(--gray);">Geen werkzaamheden gevonden voor deze maand.</td>';
    taskBody.appendChild(tr);
    return;
  }

  let lastCat = '';
  monthTasks.forEach(task => {
    if (task.categorie && task.categorie !== lastCat) {
      lastCat = task.categorie;
      const catRow = document.createElement('tr');
      catRow.innerHTML = `<td colspan="5" style="background:var(--orange-light);padding:10px 20px;font-size:13px;font-weight:700;color:var(--orange-dark);text-transform:uppercase;letter-spacing:1px;border-left:4px solid var(--orange);">${escapeHTML(task.categorie)}</td>`;
      taskBody.appendChild(catRow);
    }

    const minutes = task.standaardTijd || 0;
    const statusLower = task.status.toLowerCase();

    let statusBadge;
    if (statusLower === 'klaar') {
      statusBadge = '<span class="badge-done klaar">Klaar</span>';
    } else if (statusLower === 'bezig') {
      statusBadge = '<span class="badge-done bezig">Bezig</span>';
    } else {
      statusBadge = '<span class="badge-done gepland">Gepland</span>';
    }

    const isUrl = task.link && /^https?:\/\//i.test(task.link.trim());
    const linkCell = isUrl
      ? `<a href="${escapeHTML(task.link.trim())}" target="_blank" class="doc-link">Bekijk &rarr;</a>`
      : `<span style="color:#ccc;font-size:12px;">&mdash;</span>`;

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><strong>${escapeHTML(task.taak)}</strong></td>
      <td><span class="task-desc">${escapeHTML(task.toelichting)}</span></td>
      <td>${minutes > 0 ? formatTime(minutes) : '<span style="color:#ccc;">&mdash;</span>'}</td>
      <td>${statusBadge}</td>
      <td>${linkCell}</td>
    `;
    taskBody.appendChild(tr);
  });
}

function formatTime(minutes) {
  if (minutes >= 60) {
    const h = Math.floor(minutes / 60);
    const m = minutes % 60;
    return m > 0 ? `${h}u ${m}m` : `${h}u`;
  }
  return `${minutes}m`;
}

function escapeHTML(str) {
  if (!str) return '';
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
async function init() {
  try {
    const rows = await fetchSheetData();
    const data = structureData(rows);

    if (!data || data.tasks.length === 0) {
      document.getElementById('loadingState').innerHTML = `
        <div class="error-msg">
          <strong>Geen data gevonden.</strong><br>
          Controleer of het tabblad gepubliceerd is naar het web.<br>
          Ga naar: Bestand &rarr; Delen &rarr; Publiceren naar web &rarr; Kies het tabblad &rarr; Publiceer.
        </div>`;
      return;
    }

    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('dashboardContent').style.display = 'block';
    renderDashboard(data);

  } catch (err) {
    document.getElementById('loadingState').innerHTML = `
      <div class="error-msg">
        <strong>Kon de Google Sheet niet laden.</strong><br>
        ${err.message}<br><br>
        Mogelijke oorzaken:<br>
        &bull; Het tabblad is nog niet gepubliceerd naar het web<br>
        &bull; Ga naar: <strong>Bestand &rarr; Delen &rarr; Publiceren naar web</strong><br>
        &bull; Selecteer het tabblad "Planning" en klik "Publiceren"
      </div>`;
  }
}

init();

// Auto-refresh elke 5 minuten
setInterval(init, 5 * 60 * 1000);
</script>
